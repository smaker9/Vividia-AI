<!DOCTYPE html>
<html>
<head>
    <title>Vividia AI</title>
    <style>
        body {
            background: #0A0A1A;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #8B5CF6;
            font-size: 48px;
        }
        .card {
            background: #12122A;
            border: 1px solid #1E1E3A;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 30px auto;
        }
        button {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>VIVIDIA AI</h1>
    <div class="card">
        <h2>Welcome to Vividia AI</h2>
        <p>If you see this card with purple background and buttons, the CSS is working!</p>
        <button>Generate Magic</button>
        <button>Get Started</button>
    </div>
</body>
</html>
