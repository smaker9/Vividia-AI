<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vividia AI - منصة الرسوم المتحركة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0A0A1A; color: white; padding: 20px; transition: all 0.3s ease; }
        body.rtl { direction: rtl; text-align: right; }
        .lang-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .lang-btn { background: #1E1E3A; color: white; border: 1px solid #8B5CF6; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .lang-btn:hover { background: #8B5CF6; }
        .card { background: #12122A; border: 1px solid #1E1E3A; border-radius: 20px; padding: 30px; margin-bottom: 20px; max-width: 600px; }
        h1 { margin-bottom: 10px; }
        p { color: #9CA3AF; margin-bottom: 20px; }
        .price { font-size: 24px; font-weight: bold; color: #8B5CF6; }
        .buttons { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .btn { background: #1E1E3A; border: 1px solid #1E1E3A; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .btn.active { background: #8B5CF6; }
        .output { background: #0A0A1A; border: 1px solid #1E1E3A; border-radius: 10px; padding: 15px; margin: 20px 0; }
        .footer { margin-top: 40px; color: #9CA3AF; }
        .footer a { color: #9CA3AF; text-decoration: none; margin: 0 10px; cursor: pointer; }
        .footer a:hover { color: #8B5CF6; }
    </style>
</head>
<body class="">
    <div style="max-width: 800px; margin: 0 auto;">

        <!-- أزرار تغيير اللغة -->
        <div class="lang-buttons">
            <button class="lang-btn" onclick="setLanguage('en')">🇺🇸 English</button>
            <button class="lang-btn" onclick="setLanguage('ar')">🇸🇦 Arabic</button>
            <button class="lang-btn" onclick="setLanguage('fr')">🇫🇷 Français</button>
            <button class="lang-btn" onclick="setLanguage('es')">🇪🇸 Español</button>
            <button class="lang-btn" onclick="setLanguage('de')">🇩🇪 Deutsch</button>
        </div>

        <!-- المحتوى الرئيسي -->
        <div class="card">
            <h1 id="title">Create Cinematic Masterpieces with AI</h1>
            <p id="desc">Turn your ideas into stunning 4K animations, films, and characters using next-gen artificial intelligence.</p>

            <!-- الأزرار الداخلية -->
            <div class="buttons">
                <button class="btn active" id="btn1" onclick="setActive(this)">IMAGE</button>
                <button class="btn" id="btn2" onclick="setActive(this)">VIDEO</button>
                <button class="btn" id="btn3" onclick="setActive(this)">MUSIC</button>
                <button class="btn" id="btn4" onclick="setActive(this)">VOICE</button>
            </div>

            <!-- صندوق الإخراج -->
            <div class="output" id="output">
                👋 Welcome! Describe your idea and click GENERATE.
            </div>

            <!-- زر التوليد -->
            <button class="lang-btn" style="width: 100%; padding: 15px;" onclick="generate()">✨ GENERATE MAGIC</button>

            <!-- بطاقة السعر (تتغير مع اللغة) -->
            <div style="margin-top: 30px; padding: 20px; background: rgba(139,92,246,0.1); border: 1px solid #8B5CF6; border-radius: 15px;">
                <div style="color: #9CA3AF; margin-bottom: 5px;">👑 Elite Membership</div>
                <div class="price" id="price">$7.99 <span style="font-size: 14px; color: #9CA3AF;" id="period">/month</span></div>
                <button class="lang-btn" style="margin-top: 10px;">✨ Full Access to All AI Models</button>
            </div>
        </div>

        <!-- روابط أسفل الصفحة (تعمل) -->
        <div class="footer" style="display: flex; gap: 20px; justify-content: center;">
            <a href="#" onclick="showModal('privacy'); return false;" id="footer1">Privacy</a>
            <a href="#" onclick="showModal('terms'); return false;" id="footer2">Terms</a>
            <a href="#" onclick="showModal('support'); return false;" id="footer3">Support</a>
        </div>
        <div style="text-align: center; margin-top: 20px;">© 2026 Vividia AI</div>
    </div>

                btn1: "صورة", btn2: "فيديو", btn3: "موسيقى", btn4: "صوت",

                footer1: "الخصوصية", footer2: "الشروط", footer3: "الدعم",

                modalTerms: "📜 شروط الخدمة\n\nيجب أن يكون عمرك 13 سنة أو أكثر لاستخدام Vividia AI. أنت مسؤول عن أمان حسابك.\n\nأنت تملك كل ما تنشئه. لا نملك أي حقوق على عملك.\n\nيمنع إنشاء محتوى غير قانوني أو ضار. نحتفظ بالحق في إنهاء الحسابات المخالفة.\n\nالاشتراكات تدفع شهرياً. يمكنك الإلغاء في أي وقت من إعدادات الحساب.",
                modalSupport: "🆘 مركز الدعم\n\n📧 البريد الإلكتروني: support@vividia-ai.com – الرد خلال 24 ساعة\n\n💬 الدردشة المباشرة: الإثنين–الجمعة، 9 صباحاً–6 مساءً\n\n❓ الأسئلة الشائعة:\n• كيف أبدأ؟ اكتب وصفاً وانقر على توليد.\n• وسائل الدفع؟ بطاقات، PayPal، عملات رقمية.\n• هل يمكن الإلغاء؟ نعم، فوراً من لوحة التحكم."
            },
            fr: {
                title: "Créez des chefs-d'œuvre cinématographiques avec l'IA",
                desc: "Transformez vos idées en animations, films et personnages 4K époustouflants avec l'IA de nouvelle génération.",
                btn1: "IMAGE", btn2: "VIDÉO", btn3: "MUSIQUE", btn4: "VOIX",

                price: "€7.99", period: "/mois",
                footer1: "Confidentialité", footer2: "Conditions", footer3: "Assistance",
                modalPrivacy: "🔒 Politique de Confidentialité\n\nNous collectons les informations de base (nom, email) et les données d'utilisation pour améliorer nos services IA. Vos créations restent vôtres.\n\nToutes les données sont cryptées avec AES-256. Nos serveurs sont sécurisés 24/7.\n\nContact: privacy@vividia-ai.com",
                modalTerms: "📜 Conditions d'Utilisation\n\nVous devez avoir 13 ans ou plus pour utiliser Vividia AI. Vous êtes responsable de la sécurité de votre compte.\n\nVous possédez tout ce que vous créez. Nous ne revendiquons aucun droit sur votre travail.\n\nNe générez pas de contenu illégal ou nuisible.\n\nAbonnements facturés mensuellement. Annulation possible à tout moment.",
                modalSupport: "🆘 Centre d'Aide\n\n📧 Email: support@vividia-ai.com – réponse sous 24h\n\n💬 Chat en direct: Lun–Ven, 9h–18h\n\n❓ FAQ:\n• Comment commencer? Décrivez votre idée et cliquez sur GÉNÉRER.\n• Moyens de paiement? Cartes, PayPal, crypto.\n• Puis-je annuler? Oui, depuis votre tableau de bord."
            },
            es: {
                title: "Crea obras maestras cinematográficas con IA",
                desc: "Convierte tus ideas en impresionantes animaciones, películas y personajes 4K con inteligencia artificial de última generación.",
                btn1: "IMAGEN", btn2: "VIDEO", btn3: "MÚSICA", btn4: "VOZ",
                output: "👋 ¡Bienvenido! Describe tu idea y haz clic en GENERAR.",
                price: "€7.99", period: "/mes",
                footer1: "Privacidad", footer2: "Términos", footer3: "Soporte",
                modalPrivacy: "🔒 Política de Privacidad\n\nRecopilamos información básica (nombre, email) y datos de uso para mejorar nuestros servicios de IA. Tus creaciones son tuyas.\n\nTodos los datos están encriptados con AES-256. Nuestros servidores están protegidos 24/7.\n\nContacto: privacy@vividia-ai.com",
                modalTerms: "📜 Términos de Servicio\n\nDebes tener 13 años o más para usar Vividia AI. Eres responsable de la seguridad de tu cuenta.\n\nEres dueño de todo lo que creas. No reclamamos derechos sobre tu trabajo.\n\nNo generes contenido ilegal o dañino.\n\nSuscripciones facturadas mensualmente. Cancelación en cualquier momento.",
                modalSupport: "🆘 Centro de Soporte\n\n📧 Email: support@vividia-ai.com – respuesta en 24h\n\n💬 Chat en vivo: Lun–Vie, 9am–6pm\n\n❓ Preguntas:\n• ¿Cómo empezar? Describe tu idea y haz clic en GENERAR.\n• Métodos de pago? Tarjetas, PayPal, cripto.\n• ¿Puedo cancelar? Sí, desde tu panel."
            },
            de: {
                title: "Erstelle filmische Meisterwerke mit KI",
                desc: "Verwandle deine Ideen in atemberaubende 4K-Animationen, Filme und Charaktere mit modernster künstlicher Intelligenz.",
                btn1: "BILD", btn2: "VIDEO", btn3: "MUSIK", btn4: "STIMME",
                output: "👋 Willkommen! Beschreibe deine Idee und klicke auf GENERIEREN.",
                price: "€7.99", period: "/Monat",
                footer1: "Datenschutz", footer2: "AGB", footer3: "Support",
                modalPrivacy: "🔒 Datenschutz\n\nWir sammeln grundlegende Informationen (Name, E-Mail) und Nutzungsdaten zur Verbesserung unserer KI-Dienste. Ihre Kreationen bleiben Ihr Eigentum.\n\nAlle Daten sind mit AES-256 verschlüsselt. Unsere Server sind 24/7 gesichert.\n\nKontakt: privacy@vividia-ai.com",
                modalTerms: "📜 AGB\n\nSie müssen mindestens 13 Jahre alt sein, um Vividia AI zu nutzen. Sie sind für die Sicherheit Ihres Kontos verantwortlich.\n\nSie besitzen alles, was Sie erstellen. Wir beanspruchen keine Rechte an Ihrer Arbeit.\n\nKeine illegalen oder schädlichen Inhalte erstellen.\n\nMonatliche Abrechnung. Jederzeit kündbar.",
                modalSupport: "🆘 Support\n\n📧 E-Mail: support@vividia-ai.com – Antwort innerhalb 24h\n\n💬 Live-Chat: Mo–Fr, 9–18 Uhr\n\n❓ FAQ:\n• Wie starten? Beschreibe deine Idee und klicke auf GENERIEREN.\n• Zahlungsmethoden? Karten, PayPal, Krypto.\n• Kann ich kündigen? Ja, im Dashboard."
            }
        };

        // ==================== دالة تغيير اللغة ====================
        function setLanguage(lang) {
            const t = translations[lang];
            
            // تغيير اتجاه الصفحة
            if (lang === 'ar') {
                document.body.classList.add('rtl');
            } else {
                document.body.classList.remove('rtl');
            }

            // تغيير النصوص الرئيسية
            document.getElementById('title').innerText = t.title;
            document.getElementById('desc').innerText = t.desc;
            document.getElementById('btn1').innerText = t.btn1;
            document.getElementById('btn2').innerText = t.btn2;
            document.getElementById('btn3').innerText = t.btn3;
            document.getElementById('btn4').innerText = t.btn4;
            document.getElementById('output').innerHTML = t.output;
            document.getElementById('price').innerHTML = t.price + ' <span style="font-size:14px;color:#9CA3AF;" id="period">' + t.period + '</span>';
            
            // تغيير روابط التذييل
            document.getElementById('footer1').innerText = t.footer1;
            document.getElementById('footer2').innerText = t.footer2;
            document.getElementById('footer3').innerText = t.footer3;

            // حفظ اللغة الحالية
            window.currentLang = lang;
        }

        // ==================== تفعيل الأزرار الداخلية ====================
        function setActive(btn) {
            document.querySelectorAll('.buttons .btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('output').innerHTML = "✅ " + btn.innerText + " mode activated";
            setTimeout(() => {
                const lang = window.currentLang || 'en';
                document.getElementById('output').innerHTML = translations[lang].output;
            }, 2000);
        }

        // ==================== زر التوليد ====================
        function generate() {
            const output = document.getElementById('output');
            output.innerHTML = "⏳ AI is creating your masterpiece...";
            setTimeout(() => {
                const lang = window.currentLang || 'en';
                output.innerHTML = "✅ Generation complete!";
                setTimeout(() => {
                    output.innerHTML = translations[lang].output;
                }, 2000);
            }, 2000);
        }

        // ==================== النوافذ المنبثقة (مترجمة بالكامل) ====================
        function showModal(type) {
            const lang = window.currentLang || 'en';
            const t = translations[lang];
            
            if (type === 'privacy') alert(t.modalPrivacy);
            else if (type === 'terms') alert(t.modalTerms);
            else if (type === 'support') alert(t.modalSupport);
        }

        // ==================== ضبط اللغة الافتراضية ====================
        window.onload = function() {
            window.currentLang = 'en';
            setLanguage('en');
        };
    </script>
</body>
</html>
