<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vividia AI - اختبار اللغات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0A0A1A; color: white; padding: 20px; transition: all 0.3s ease; }
        body.rtl { direction: rtl; text-align: right; }
        .lang-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .lang-btn { background: #1E1E3A; color: white; border: 1px solid #8B5CF6; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .lang-btn:hover { background: #8B5CF6; }
        .card { background: #12122A; border: 1px solid #1E1E3A; border-radius: 20px; padding: 30px; margin-bottom: 20px; max-width: 600px; }
        h1 { margin-bottom: 10px; }
        p { color: #9CA3AF; margin-bottom: 20px; }
        .price { font-size: 24px; font-weight: bold; color: #8B5CF6; }
        .buttons { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .btn { background: #1E1E3A; border: 1px solid #1E1E3A; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .btn.active { background: #8B5CF6; }
        .output { background: #0A0A1A; border: 1px solid #1E1E3A; border-radius: 10px; padding: 15px; margin: 20px 0; }
        .footer { margin-top: 40px; color: #9CA3AF; }
    </style>
</head>
<body class="">
    <div style="max-width: 800px; margin: 0 auto;">

        <!-- أزرار تغيير اللغة -->
        <div class="lang-buttons">
            <button class="lang-btn" onclick="setLanguage('en')">🇺🇸 English</button>
            <button class="lang-btn" onclick="setLanguage('ar')">🇸🇦 العربية</button>
            <button class="lang-btn" onclick="setLanguage('fr')">🇫🇷 Français</button>
            <button class="lang-btn" onclick="setLanguage('es')">🇪🇸 Español</button>
            <button class="lang-btn" onclick="setLanguage('de')">🇩🇪 Deutsch</button>
        </div>

        <!-- المحتوى الرئيسي -->
        <div class="card">
            <h1 id="title">Create Cinematic Masterpieces with AI</h1>
            <p id="desc">Turn your ideas into stunning 4K animations, films, and characters using next-gen artificial intelligence.</p>

            <!-- الأزرار الداخلية -->
            <div class="buttons">
                <button class="btn active" id="btn1" onclick="setActive(this)">IMAGE</button>
                <button class="btn" id="btn2" onclick="setActive(this)">VIDEO</button>
                <button class="btn" id="btn3" onclick="setActive(this)">MUSIC</button>
                <button class="btn" id="btn4" onclick="setActive(this)">VOICE</button>
            </div>

            <!-- صندوق الإخراج -->
            <div class="output" id="output">
                👋 Welcome! Describe your idea and click GENERATE.
            </div>

            <!-- زر التوليد -->
            <button class="lang-btn" style="width: 100%; padding: 15px;" onclick="generate()">✨ GENERATE MAGIC</button>

            <!-- بطاقة السعر (تتغير مع اللغة) -->
            <div style="margin-top: 30px; padding: 20px; background: rgba(139,92,246,0.1); border: 1px solid #8B5CF6; border-radius: 15px;">
                <div style="color: #9CA3AF; margin-bottom: 5px;">👑 Elite Membership</div>
                <div class="price" id="price">$7.99 <span style="font-size: 14px; color: #9CA3AF;" id="period">/month</span></div>
                <button class="lang-btn" style="margin-top: 10px;">✨ Full Access to All AI Models</button>
            </div>
        </div>

        <!-- روابط أسفل الصفحة (تعمل) -->
        <div class="footer" style="display: flex; gap: 20px; justify-content: center;">
            <a href="#" onclick="showModal('privacy'); return false;">Privacy</a>
            <a href="#" onclick="showModal('terms'); return false;">Terms</a>
            <a href="#" onclick="showModal('support'); return false;">Support</a>
        </div>
        <div style="text-align: center; margin-top: 20px;">© 2026 Vividia AI</div>
    </div>

    <script>
        // ==================== بيانات الترجمة ====================
        const translations = {
            en: {
                title: "Create Cinematic Masterpieces with AI",
                desc: "Turn your ideas into stunning 4K animations, films, and characters using next-gen artificial intelligence.",
                btn1: "IMAGE", btn2: "VIDEO", btn3: "MUSIC", btn4: "VOICE",
                output: "👋 Welcome! Describe your idea and click GENERATE.",
                price: "$7.99", period: "/month",
                footer1: "Privacy", footer2: "Terms", footer3: "Support"
            },
            ar: {
                title: "اصنع روائع سينمائية بالذكاء الاصطناعي",
                desc: "حوّل أفكارك إلى رسوم متحركة وأفلام وشخصيات مذهلة بدقة 4K باستخدام أحدث تقنيات الذكاء الاصطناعي",
                btn1: "صورة", btn2: "فيديو", btn3: "موسيقى", btn4: "صوت",
                output: "👋 مرحباً! صف فكرتك وانقر على توليد.",
                price: "﷼ 29.99", period: "/شهر",
                footer1: "الخصوصية", footer2: "الشروط", footer3: "الدعم"
            },
            fr: {
                title: "Créez des chefs-d'œuvre cinématographiques avec l'IA",
                desc: "Transformez vos idées en animations, films et personnages 4K époustouflants avec l'IA de nouvelle génération.",
                btn1: "IMAGE", btn2: "VIDÉO", btn3: "MUSIQUE", btn4: "VOIX",
                output: "👋 Bienvenue! Décrivez votre idée et cliquez sur GÉNÉRER.",
                price: "€7.99", period: "/mois",
                footer1: "Confidentialité", footer2: "Conditions", footer3: "Assistance"
            },
            es: {
                title: "Crea obras maestras cinematográficas con IA",
                desc: "Convierte tus ideas en impresionantes animaciones, películas y personajes 4K con inteligencia artificial de última generación.",
                btn1: "IMAGEN", btn2: "VIDEO", btn3: "MÚSICA", btn4: "VOZ",
                output: "👋 ¡Bienvenido! Describe tu idea y haz clic en GENERAR.",
                price: "€7.99", period: "/mes",
                footer1: "Privacidad", footer2: "Términos", footer3: "Soporte"
            },
            de: {
                title: "Erstelle filmische Meisterwerke mit KI",
                desc: "Verwandle deine Ideen in atemberaubende 4K-Animationen, Filme und Charaktere mit modernster künstlicher Intelligenz.",
                btn1: "BILD", btn2: "VIDEO", btn3: "MUSIK", btn4: "STIMME",
                output: "👋 Willkommen! Beschreibe deine Idee und klicke auf GENERIEREN.",
                price: "€7.99", period: "/Monat",
                footer1: "Datenschutz", footer2: "AGB", footer3: "Support"
            }
        };

        // ==================== دالة تغيير اللغة (تعمل 100%) ====================
        function setLanguage(lang) {
            const t = translations[lang];
            
            // تغيير اتجاه الصفحة (يمين لليسار للعربية)
            if (lang === 'ar') {
                document.body.classList.add('rtl');
            } else {
                document.body.classList.remove('rtl');
            }

            // تغيير جميع النصوص
            document.getElementById('title').innerText = t.title;
            document.getElementById('desc').innerText = t.desc;
            document.getElementById('btn1').innerText = t.btn1;
            document.getElementById('btn2').innerText = t.btn2;
            document.getElementById('btn3').innerText = t.btn3;
            document.getElementById('btn4').innerText = t.btn4;
            document.getElementById('output').innerHTML = t.output;
            document.getElementById('price').innerHTML = t.price + ' <span style="font-size:14px;color:#9CA3AF;" id="period">' + t.period + '</span>';
            
            // تغيير روابط التذييل
            const footerLinks = document.querySelectorAll('.footer a');
            if (footerLinks.length >= 3) {
                footerLinks[0].innerText = t.footer1;
                footerLinks[1].innerText = t.footer2;
                footerLinks[2].innerText = t.footer3;
            }

            console.log("تم تغيير اللغة إلى:", lang);
        }

        // ==================== تفعيل الأزرار الداخلية (IMAGE, VIDEO, ...) ====================
        function setActive(btn) {
            // إزالة التفعيل من جميع الأزرار
            document.querySelectorAll('.buttons .btn').forEach(b => {
                b.classList.remove('active');
            });
            // تفعيل الزر المضغوط
            btn.classList.add('active');
            // تغيير نص الإخراج
            document.getElementById('output').innerHTML = "✅ " + btn.innerText + " mode activated";
            // إعادة النص الأصلي بعد ثانيتين
            setTimeout(() => {
                const currentLang = document.body.classList.contains('rtl') ? 'ar' : 'en';
                document.getElementById('output').innerHTML = translations[currentLang].output;
            }, 2000);
        }

        // ==================== زر التوليد ====================
        function generate() {
            const output = document.getElementById('output');
            output.innerHTML = "⏳ AI is creating your masterpiece...";
            setTimeout(() => {
                const currentLang = document.body.classList.contains('rtl') ? 'ar' : 'en';
                output.innerHTML = "✅ Generation complete!";
                setTimeout(() => {
                    output.innerHTML = translations[currentLang].output;
                }, 2000);
            }, 2000);
        }

        // ==================== النوافذ المنبثقة (روابط التذييل) ====================
        function showModal(type) {
            if (type === 'privacy') alert("🔒 Privacy Policy: We collect basic account details and usage data to improve our services. Your creations remain yours.");
            else if (type === 'terms') alert("📜 Terms of Service: You must be 13+ to use this service. You own everything you create. No illegal content.");
            else if (type === 'support') alert("🆘 Support: Email: support@vividia-ai.com - Live chat available Mon-Fri 9am-6pm");
        }

        // ==================== ضبط اللغة الافتراضية عند تحميل الصفحة ====================
        window.onload = function() {
            setLanguage('en');
        };
    </script>
</body>
</html>
