<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIDIA AI | Elite Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(18, 18, 18, 0.9);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.3s ease;
        }

        /* --- Header & Auth --- */
        .header {
            width: 100%; max-width: 1200px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box;
        }
        .auth-group { display: flex; gap: 12px; }
        .btn { padding: 10px 22px; border-radius: 12px; cursor: pointer; border: none; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: linear-gradient(to right, var(--accent-purple), var(--accent-pink)); color: white; }
        .btn-secondary { background: #1a1a1a; color: white; border: 1px solid var(--border-color); }

        /* --- Main Creation Area --- */
        .creation-container {
            width: 95%; max-width: 700px; margin-top: 20px;
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 24px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        /* --- Prompt Input with Glowing Magic Icon --- */
        .prompt-wrapper {
            position: relative; background: #000; border: 1px solid var(--border-color);
            border-radius: 18px; padding: 15px; margin-bottom: 20px;
        }
        .prompt-wrapper textarea {
            width: 90%; background: transparent; border: none; color: white;
            font-size: 1.1rem; outline: none; resize: none; min-height: 80px;
        }
        .magic-icon {
            position: absolute; bottom: 15px; right: 15px;
            font-size: 1.5rem; cursor: pointer;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.6));
            transition: 0.3s;
        }

        /* --- Dynamic Progress Bar --- */
        #progressContainer {
            width: 100%; height: 6px; background: #111; border-radius: 10px;
            margin: 15px 0; display: none; overflow: hidden; position: relative;
        }
        #progressBar {
            width: 0%; height: 100%; 
            background: linear-gradient(to right, var(--accent-purple), var(--accent-pink));
            box-shadow: 0 0 10px var(--accent-purple);
            transition: width 0.4s ease;
        }
        #statusText { font-size: 0.8rem; color: var(--accent-purple); text-align: center; margin-bottom: 10px; display: none; font-weight: bold;}

        /* --- Settings Bar --- */
        .settings-bar {
            display: flex; gap: 15px; margin-bottom: 20px; padding: 10px;
            background: rgba(255,255,255,0.03); border-radius: 12px; position: relative;
        }
        .setting-item { cursor: pointer; font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }
        .dropdown-menu {
            position: absolute; top: 50px; left: 10px; width: 220px;
            background: #151515; border: 1px solid var(--border-color);
            border-radius: 15px; padding: 15px; display: none; z-index: 100;
        }

        /* --- Grid Icons --- */
        .services-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px;
        }
        .service-card {
            background: #1a1a1a; padding: 15px; border-radius: 16px; text-align: center;
            border: 1px solid var(--border-color); cursor: pointer; transition: 0.3s;
        }
        .service-card.active { background: var(--accent-purple); border-color: transparent; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        .service-card i { font-size: 1.5rem; margin-bottom: 8px; display: block; }

        /* --- Preview Area --- */
        #previewBox {
            width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 20px; display: none;
            border: 1px solid var(--accent-purple);
        }
        #previewBox img, #previewBox video { width: 100%; display: block; }

        /* --- Actions --- */
        .media-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-action { padding: 12px; border-radius: 10px; background: #222; color: white; border: 1px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* --- Community Feed --- */
        .community-feed { width: 100%; max-width: 700px; margin-top: 30px; padding: 0 10px; box-sizing: border-box; }
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .feed-item { height: 180px; background: #111; border-radius: 15px; overflow: hidden; border: 1px solid var(--border-color); }
        .feed-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 600px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border-color);
            z-index: 1000;
        }
        .nav-link { text-align: center; color: var(--text-dim); cursor: pointer; flex: 1; }
        .nav-link.active { color: var(--accent-purple); }
    </style>
</head>
<body>

    <audio id="magicSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <header class="header">
        <div style="font-size: 1.5rem; font-weight: 800;">VIVIDIA <span style="color:var(--accent-purple)">AI</span></div>
        <div class="auth-group">
            <button class="btn btn-secondary" id="btnSignIn">Sign In</button>
            <button class="btn btn-primary" id="btnStart">Get Started</button>
        </div>
    </header>

    <main class="creation-container">
        <div class="settings-bar">
            <div class="setting-item" onclick="toggleMenu()"><i class="fas fa-sliders"></i> <span id="txtModel">Model Settings</span></div>
            <div class="setting-item"><i class="fas fa-wand-magic-sparkles"></i> <span id="txtImprove">Improve</span></div>
            <div class="dropdown-menu" id="modelMenu">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">Model <span>Vividia 3.0 ></span></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">Ratio <span>16:9 ></span></div>
                <div style="display:flex; justify-content:space-between;">Style <span>Cinematic ></span></div>
            </div>
        </div>

        <div id="previewBox"></div>

        <div class="prompt-wrapper">
            <textarea id="promptField" placeholder="Describe your vision..."></textarea>
            <i class="fas fa-magic magic-icon" onclick="sparkMagic()"></i>
        </div>

        <div class="services-grid">
            <div class="service-card active" onclick="sel(this)"><i class="fas fa-image"></i><span>Image</span></div>
            <div class="service-card" onclick="sel(this)"><i class="fas fa-play"></i><span>Video</span></div>
            <div class="service-card" onclick="sel(this)"><i class="fas fa-microphone"></i><span>Voice</span></div>
            <div class="service-card" onclick="sel(this)"><i class="fas fa-language"></i><span>Dubbing</span></div>
            <div class="service-card" onclick="sel(this)"><i class="fas fa-music"></i><span>Music</span></div>
            <div class="service-card" onclick="sel(this)"><i class="fas fa-wave-square"></i><span>SFX</span></div>
        </div>

        <div class="media-actions">
            <button class="btn-action" onclick="document.getElementById('realUpload').click()">
                <i class="fas fa-cloud-upload-alt"></i> <span id="txtUpload">Upload</span>
            </button>
            <input type="file" id="realUpload" style="display:none" onchange="handleFile(this)">
            
            <button class="btn-action" style="background: var(--accent-purple);" onclick="downloadMP4()">
                <i class="fas fa-download"></i> Download MP4
            </button>
        </div>

        <div id="statusText">Analyzing Prompt...</div>
        <div id="progressContainer"><div id="progressBar"></div></div>
        
        <button class="btn btn-primary" style="width:100%; padding:18px; font-size:1.1rem;" id="txtGenerate" onclick="startGeneration()">GENERATE MAGIC</button>
        
        <div id="priceTag" style="text-align:center; margin-top:15px; font-weight:bold; color:var(--accent-pink);">
            Elite Plan: 7.60$ / month
        </div>
    </main>

    <div class="community-feed">
        <h4 id="txtRecent" style="color: var(--text-dim); margin-bottom:15px;">Recent Creations</h4>
        <div class="feed-grid">
            <div class="feed-item"><img src="https://images.unsplash.com/photo-1614728263952-84ea206f99b6?w=400"></div>
            <div class="feed-item"><img src="https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=400"></div>
        </div>
    </div>

    <div style="height: 100px;"></div>

    <nav class="bottom-nav">
        <div class="nav-link active"><i class="fas fa-home"></i><p style="margin:0; font-size:0.7rem;">Home</p></div>
        <div class="nav-link"><i class="fas fa-images"></i><p style="margin:0; font-size:0.7rem;">Gallery</p></div>
        <div class="nav-link" id="langSwitcher" onclick="changeLang()"><i class="fas fa-globe"></i><p id="currLang" style="margin:0; font-size:0.7rem;">EN</p></div>
    </nav>

    <script>
        // --- Dynamic Generation & Magic Sounds ---
        function startGeneration() {
            const btn = document.getElementById('txtGenerate');
            const prompt = document.getElementById('promptField').value;
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            const magicSound = document.getElementById('magicSound');
            const successSound = document.getElementById('successSound');

            if(!prompt) {
                alert(document.documentElement.lang === 'ar' ? "يرجى كتابة وصف أولاً" : "Please enter a prompt first!");
                return;
            }

            // Start Magic Sound
            magicSound.currentTime = 0;
            magicSound.play();

            // UI Changes
            btn.disabled = true;
            btn.style.opacity = '0.5';
            progressContainer.style.display = 'block';
            statusText.style.display = 'block';
            
            let width = 0;
            const statusAr = ["تحليل البيانات...", "توليد العناصر...", "تحسين الجودة...", "جاري الإنهاء..."];
            const statusEn = ["Analyzing Data...", "Generating Elements...", "Enhancing Quality...", "Finalizing..."];
            const isAr = document.documentElement.lang === 'ar';

            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    // Stop magic sound and play success
                    magicSound.pause();
                    successSound.currentTime = 0;
                    successSound.play();

                    statusText.innerText = isAr ? "اكتمل بنجاح!" : "Complete!";
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        progressContainer.style.display = 'none';
                        statusText.style.display = 'none';
                        progressBar.style.width = '0%';
                        alert(isAr ? "تم إنتاج السحر بنجاح!" : "Magic Generated Successfully!");
                    }, 1000);
                } else {
                    width += Math.random() * 12; // Realistic random movement
                    if(width > 100) width = 100;
                    progressBar.style.width = width + '%';
                    
                    const textSet = isAr ? statusAr : statusEn;
                    if(width < 25) statusText.innerText = textSet[0];
                    else if(width < 50) statusText.innerText = textSet[1];
                    else if(width < 75) statusText.innerText = textSet[2];
                    else statusText.innerText = textSet[3];
                }
            }, 600);
        }

        // --- Multi-Language & Currency Logic ---
        const translations = {
            EN: { dir: 'ltr', upload: 'Upload', generate: 'GENERATE MAGIC', recent: 'Recent Creations', model: 'Model Settings', improve: 'Improve', price: 'Elite Plan: 7.60$ / month', prompt: 'Describe your vision...', signin: 'Sign In', start: 'Get Started' },
            AR: { dir: 'rtl', upload: 'رفع ملف', generate: 'توليد السحر', recent: 'آخر الابتكارات', model: 'إعدادات النموذج', improve: 'تحسين', price: 'الباقة النخبوية: 28.50 ريال / شهر', prompt: 'صف رؤيتك الفنية...', signin: 'تسجيل دخول', start: 'ابدأ الآن' },
            FR: { dir: 'ltr', upload: 'Télécharger', generate: 'GÉNÉRER LA MAGIE', recent: 'Créations récentes', model: 'Réglages', improve: 'Améliorer', price: 'Plan Élite: 7.00€ / mois', prompt: 'Décrivez votre vision...', signin: 'Connexion', start: 'Commencer' }
        };

        let langKeys = Object.keys(translations);
        let currentLangIdx = 0;

        function changeLang() {
            currentLangIdx = (currentLangIdx + 1) % langKeys.length;
            let key = langKeys[currentLangIdx];
            let data = translations[key];
            document.documentElement.dir = data.dir;
            document.documentElement.lang = key.toLowerCase();
            document.getElementById('currLang').innerText = key;
            document.getElementById('txtUpload').innerText = data.upload;
            document.getElementById('txtGenerate').innerText = data.generate;
            document.getElementById('txtRecent').innerText = data.recent;
            document.getElementById('txtModel').innerText = data.model;
            document.getElementById('txtImprove').innerText = data.improve;
            document.getElementById('priceTag').innerText = data.price;
            document.getElementById('promptField').placeholder = data.prompt;
            document.getElementById('btnSignIn').innerText = data.signin;
            document.getElementById('btnStart').innerText = data.start;
        }

        function handleFile(input) {
            const file = input.files[0];
            const preview = document.getElementById('previewBox');
            preview.innerHTML = '';
            if (file) {
                preview.style.display = 'block';
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (file.type.startsWith('image/')) preview.innerHTML = `<img src="${e.target.result}">`;
                    else if (file.type.startsWith('video/')) preview.innerHTML = `<video src="${e.target.result}" controls></video>`;
                };
                reader.readAsDataURL(file);
            }
        }

        function toggleMenu() {
            const m = document.getElementById('modelMenu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function sel(el) {
            document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function sparkMagic() {
            const f = document.getElementById('promptField');
            if(f.value) f.value = "Professional 8k, high detail, masterpiece: " + f.value;
        }

        function downloadMP4() { alert("Preparing MP4..."); }
    </script>
</body>
</html>
