<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIDIA AI | Elite Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(15, 15, 15, 0.98);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .vividia-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .header { width: 100%; max-width: 1200px; padding: 30px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        
        .auth-group { display: flex; gap: 15px; }
        .btn { padding: 12px 26px; border-radius: 14px; cursor: pointer; border: none; font-weight: 700; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(to right, var(--accent-purple), var(--accent-pink)); color: white; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border-color); }
        .btn:active { transform: scale(0.95); }

        .creation-container {
            width: 95%; max-width: 800px; margin-top: 10px;
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 35px; padding: 35px; box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            box-sizing: border-box; position: relative;
        }

        /* Dropdown Aesthetics */
        .settings-bar { display: flex; gap: 15px; margin-bottom: 25px; position: relative; }
        .setting-item { 
            cursor: pointer; font-size: 0.85rem; color: var(--text-dim); 
            display: flex; align-items: center; gap: 8px; padding: 10px 18px; 
            background: rgba(255,255,255,0.03); border-radius: 12px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid var(--border-color);
        }
        .setting-item:hover { 
            background: rgba(168, 85, 247, 0.1); color: white; 
            border-color: var(--accent-purple); transform: translateY(-2px);
        }

        .dropdown-content {
            position: absolute; top: 60px; width: 220px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px); 
            border: 1px solid rgba(168, 85, 247, 0.4); border-radius: 20px; 
            padding: 12px; display: none; z-index: 5000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(168, 85, 247, 0.1);
            transform-origin: top; animation: slideDown 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .dropdown-option { 
            padding: 12px 15px; border-radius: 12px; cursor: pointer; 
            transition: 0.3s; font-size: 0.9rem; color: var(--text-dim);
            display: flex; align-items: center; justify-content: space-between;
        }
        .dropdown-option:hover { 
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.2), transparent);
            color: white; padding-right: 20px;
        }

        .prompt-wrapper { position: relative; background: #000; border: 1px solid var(--border-color); border-radius: 22px; padding: 20px; margin-bottom: 30px; }
        textarea { width: 92%; background: transparent; border: none; color: white; font-size: 1.15rem; outline: none; resize: none; min-height: 110px; line-height: 1.6; }
        
        .magic-trigger {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 1.6rem; cursor: pointer;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: 0.5s;
        }

        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 35px; }
        .service-card {
            background: rgba(255,255,255,0.02); padding: 25px; border-radius: 24px; text-align: center;
            border: 1px solid var(--border-color); cursor: pointer; transition: 0.4s;
        }
        .service-card.active { background: var(--accent-purple); border-color: transparent; box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4); }
        .service-card i { font-size: 1.8rem; margin-bottom: 12px; display: block; }

        .footer-credits { margin-top: 40px; margin-bottom: 120px; text-align: center; color: var(--text-dim); font-size: 0.85rem; opacity: 0.6; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 650px;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 25px 0; border-top: 1px solid var(--border-color);
            z-index: 4000; border-radius: 30px 30px 0 0;
        }
        .nav-link { text-align: center; color: var(--text-dim); cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-link.active { color: var(--accent-purple); text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
        .nav-link i { font-size: 1.5rem; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <audio id="audioClick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="audioSelect" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <header class="header">
        <div class="vividia-logo">VIVIDIA AI</div>
        <div class="auth-group">
            <button class="btn btn-secondary" onclick="playSound('click')">Sign In</button>
            <button class="btn btn-primary" onclick="playSound('click')">Get Started</button>
        </div>
    </header>

    <main class="creation-container">
        <div class="settings-bar">
            <div class="setting-item" onclick="toggleDrop('modelDrop', event)">
                <i class="fas fa-brain"></i> <span id="txtModel">Model: Vividia 3.0</span> <i class="fas fa-chevron-down" style="font-size:0.7rem; margin-right:5px;"></i>
            </div>
            
            <div class="setting-item" onclick="toggleDrop('ratioDrop', event)">
                <i class="fas fa-expand"></i> <span id="txtRatio">Ratio: 16:9</span> <i class="fas fa-chevron-down" style="font-size:0.7rem; margin-right:5px;"></i>
            </div>
            
            <div id="modelDrop" class="dropdown-content" style="right: 0;">
                <div class="dropdown-option" onclick="applySet('txtModel', 'Vividia 3.0 Ultra')">Vividia 3.0 Ultra <i class="fas fa-check"></i></div>
                <div class="dropdown-option" onclick="applySet('txtModel', 'Cinematic Pro')">Cinematic Pro <i class="fas fa-check"></i></div>
                <div class="dropdown-option" onclick="applySet('txtModel', 'Anime V2')">Anime V2 <i class="fas fa-check"></i></div>
            </div>

            <div id="ratioDrop" class="dropdown-content" style="right: 170px;">
                <div class="dropdown-option" onclick="applySet('txtRatio', '1:1 Square')">1:1 Square <i class="fas fa-check"></i></div>
                <div class="dropdown-option" onclick="applySet('txtRatio', '16:9 Cinema')">16:9 Cinema <i class="fas fa-check"></i></div>
                <div class="dropdown-option" onclick="applySet('txtRatio', '9:16 Portrait')">9:16 Portrait <i class="fas fa-check"></i></div>
            </div>
        </div>

        <div class="prompt-wrapper">
            <textarea id="promptIn" placeholder="Describe your masterpiece..."></textarea>
            <i class="fas fa-wand-magic-sparkles magic-trigger" onclick="playSound('select')"></i>
        </div>

        <div class="services-grid">
            <div class="service-card active" onclick="selMode(this)"><i class="fas fa-image"></i><span>Image</span></div>
            <div class="service-card" onclick="selMode(this)"><i class="fas fa-video"></i><span>Video</span></div>
            <div class="service-card" onclick="selMode(this)"><i class="fas fa-music"></i><span>Music</span></div>
        </div>

        <button class="btn btn-primary" style="width:100%; padding:22px; font-size:1.2rem;" onclick="playSound('click'); alert('Engine Started!')">GENERATE MAGIC</button>
    </main>

    <footer class="footer-credits">
        <p>© 2026 VIVIDIA AI - Professional Creative Suite</p>
    </footer>

    <nav class="bottom-nav">
        <div class="nav-link active" onclick="playSound('click')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-link" onclick="playSound('click')"><i class="fas fa-images"></i><span>Gallery</span></div>
        <div class="nav-link" onclick="playSound('click')"><i class="fas fa-info-circle"></i><span>Help</span></div>
        <div class="nav-link" onclick="cycleLang(); playSound('click')"><i class="fas fa-globe"></i><span id="langCode">EN</span></div>
    </nav>

    <script>
        // Sound Management
        function playSound(type) {
            const click = document.getElementById('audioClick');
            const select = document.getElementById('audioSelect');
            if(type === 'click') {
                click.currentTime = 0;
                click.volume = 0.3;
                click.play();
            } else {
                select.currentTime = 0;
                select.volume = 0.4;
                select.play();
            }
        }

        function toggleDrop(id, e) {
            e.stopPropagation();
            playSound('click');
            const drop = document.getElementById(id);
            const isVisible = drop.style.display === 'block';
            
            document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
            if(!isVisible) drop.style.display = 'block';
        }

        function applySet(id, val) {
            playSound('select');
            document.getElementById(id).innerText = val;
            const item = document.getElementById(id).parentElement;
            item.style.transform = "scale(1.05)";
            setTimeout(() => item.style.transform = "scale(1)", 200);
            document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
        }

        window.onclick = function() {
            document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
        };

        function selMode(el) {
            playSound('click');
            document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function cycleLang() {
            const lbl = document.getElementById('langCode');
            lbl.innerText = lbl.innerText === 'EN' ? 'AR' : 'EN';
            document.documentElement.dir = lbl.innerText === 'AR' ? 'rtl' : 'ltr';
        }
    </script>
</body>
</html>
