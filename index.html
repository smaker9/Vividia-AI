<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vividia AI - منصة الإبداع المتكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0A0A1A; color: white; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 28px; font-weight: bold; background: linear-gradient(135deg, #8B5CF6, #3B82F6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .profile { display: flex; align-items: center; gap: 20px; background: #12122A; padding: 10px 20px; border-radius: 50px; }
        .points { background: #1E1E3A; padding: 8px 15px; border-radius: 30px; }
        .points i { color: gold; }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .service-card {
            background: #12122A;
            border: 1px solid #8B5CF6;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .service-card:hover { transform: translateY(-5px); border-color: #8B5CF6; box-shadow: 0 10px 20px rgba(139,92,246,0.3); }
        .service-card i { font-size: 40px; color: #8B5CF6; margin-bottom: 10px; }
        .service-card .remaining { color: #9CA3AF; margin-top: 10px; }
        
        .prompt-area {
            background: #12122A;
            border: 1px solid #1E1E3A;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .prompt-input {
            width: 100%;
            padding: 15px;
            background: #0A0A1A;
            border: 1px solid #1E1E3A;
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
        }
        .generate-btn {
            background: linear-gradient(135deg, #8B5CF6, #3B82F6);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        
        .output {
            background: #0A0A1A;
            border: 1px solid #1E1E3A;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            min-height: 100px;
        }
        
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        .pricing-card {
            background: #12122A;
            border: 1px solid #1E1E3A;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }
        .pricing-card.popular { border: 2px solid #8B5CF6; }
        .price { font-size: 32px; color: #8B5CF6; margin: 15px 0; }
        .subscribe-btn {
            background: transparent;
            border: 1px solid #8B5CF6;
            color: white;
            padding: 12px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
        }
        .subscribe-btn.popular { background: #8B5CF6; }
        
        .footer {
            border-top: 1px solid #1E1E3A;
            padding: 30px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
        }
        .footer a { color: #9CA3AF; text-decoration: none; }
        .footer a:hover { color: #8B5CF6; }
    </style>
</head>
<body>
    <div style="max-width: 1200px; margin: 0 auto;">
        
        <div class="header">
            <div class="logo">VIVIDIA AI</div>
            <div class="profile">
                <div class="points"><i class="fas fa-star"></i> <span id="totalPoints">2000M</span></div>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-card" onclick="selectService('image')">
                <i class="fas fa-image"></i>
                <h3>صور</h3>
                <p>حوّل النص إلى صورة</p>
                <div class="remaining" id="imageCredits">200 صورة</div>
            </div>
            <div class="service-card" onclick="selectService('text')">
                <i class="fas fa-file-alt"></i>
                <h3>نصوص</h3>
                <p>كتابة إبداعية</p>
                <div class="remaining" id="textCredits">2000M كلمة</div>
            </div>
            <div class="service-card" onclick="selectService('video')">
                <i class="fas fa-video"></i>
                <h3>فيديو (قريباً)</h3>
                <p>قيد التطوير</p>
                <div class="remaining" id="videoCredits">يأتي لاحقاً</div>
            </div>
        </div>

        <div class="prompt-area">
            <textarea class="prompt-input" id="promptInput" rows="3" placeholder="اكتب وصفاً...">مشهد سينمائي لغابة في الليل</textarea>
            <button class="generate-btn" onclick="generate()">توليد</button>
        </div>

        <div class="output" id="output">
            👋 اختر خدمة واكتب وصفك
        </div>

        <div class="pricing-grid">
            <div class="pricing-card">
                <h3>مجاني</h3>
                <div class="price">$0</div>
                <p>5 صور شهرياً</p>
                <button class="subscribe-btn" onclick="selectPlan('free')">خطتك الحالية</button>
            </div>
            <div class="pricing-card popular">
                <h3>احترافي</h3>
                <div class="price">$7.99</div>
                <p>100 صورة + 50,000 كلمة</p>
                <button class="subscribe-btn popular" onclick="selectPlan('pro')">اشترك الآن</button>
            </div>
            <div class="pricing-card">
                <h3>مبدع</h3>
                <div class="price">$19.99</div>
                <p>500 صورة + 200,000 كلمة</p>
                <button class="subscribe-btn" onclick="selectPlan('creative')">اشترك الآن</button>
            </div>
        </div>

        <div class="footer">
            <a href="#">الخصوصية</a>
            <a href="#">الشروط</a>
            <a href="#">الدعم</a>
        </div>
    </div>

    <script>
        // مفتاح SiliconFlow الخاص بك
        const SILICONFLOW_KEY = 'sk-okdgfpnboitlnkyrznklbirazlrirfivfsdinqbzmwyytvwf';
        
        let userCredits = {
            images: 5,      // للمستخدم المجاني
            texts: 50000,   // 50,000 كلمة
            videos: 0
        };
        
        let selectedService = 'image';

        function selectService(service) {
            selectedService = service;
        }

        async function generate() {
            const prompt = document.getElementById('promptInput').value;
            const output = document.getElementById('output');
            
            if (selectedService === 'image') {
                output.innerHTML = '⏳ جاري إنشاء الصورة...';
                
                try {
                    const response = await fetch('https://api.siliconflow.cn/v1/images/generations', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${SILICONFLOW_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'stabilityai/stable-diffusion-xl',
                            prompt: prompt,
                            n: 1,
                            size: '1024x1024'
                        })
                    });
                    
                    const data = await response.json();
                    output.innerHTML = `✅ تم إنشاء الصورة! <br> <img src="${data.data[0].url}" style="max-width:100%; margin-top:10px;">`;
                } catch (error) {
                    output.innerHTML = '❌ حدث خطأ، تأكد من مفتاح API';
                }
            }
            
            else if (selectedService === 'text') {
                output.innerHTML = '⏳ جاري كتابة النص...';
                
                try {
                    const response = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${SILICONFLOW_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'deepseek-ai/DeepSeek-V3',
                            messages: [{ role: 'user', content: prompt }]
                        })
                    });
                    
                    const data = await response.json();
                    output.innerHTML = `✅ تم إنشاء النص: <br> ${data.choices[0].message.content}`;
                } catch (error) {
                    output.innerHTML = '❌ حدث خطأ، تأكد من مفتاح API';
                }
            }
        }

        function selectPlan(plan) {
            if (plan === 'free') {
                userCredits = { images: 5, texts: 50000, videos: 0 };
            } else if (plan === 'pro') {
                userCredits = { images: 100, texts: 500000, videos: 5 };
            } else if (plan === 'creative') {
                userCredits = { images: 500, texts: 2000000, videos: 20 };
            }
            updateCredits();
        }

        function updateCredits() {
            document.getElementById('imageCredits').innerHTML = userCredits.images + ' صورة';
            document.getElementById('textCredits').innerHTML = (userCredits.texts/1000) + 'K كلمة';
        }

        window.onload = updateCredits;
    </script>
</body>
</html>
