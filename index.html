<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vividia AI - المنصة العالمية للإبداع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0A0A1A; color: white; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 28px; font-weight: bold; background: linear-gradient(135deg, #8B5CF6, #3B82F6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .profile { display: flex; align-items: center; gap: 20px; background: #12122A; padding: 10px 20px; border-radius: 50px; }
        .points { background: #1E1E3A; padding: 8px 15px; border-radius: 30px; }
        .points i { color: gold; }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .service-card {
            background: #12122A;
            border: 1px solid #8B5CF6;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }
        .service-card i { font-size: 30px; color: #8B5CF6; }
        
        .prompt-area {
            background: #12122A;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .prompt-input {
            width: 100%;
            padding: 15px;
            background: #0A0A1A;
            border: 1px solid #1E1E3A;
            border-radius: 15px;
            color: white;
            margin-bottom: 15px;
        }
        .generate-btn {
            background: linear-gradient(135deg, #8B5CF6, #3B82F6);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
        }
        
        .output {
            background: #0A0A1A;
            border: 1px solid #1E1E3A;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            min-height: 100px;
        }
        
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        .plan-card {
            background: #12122A;
            border: 1px solid #1E1E3A;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .plan-card.popular { border: 2px solid #8B5CF6; }
        .plan-price { font-size: 32px; color: #8B5CF6; margin: 15px 0; }
        
        .payment-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .payment-modal.show { display: flex; }
        .payment-card {
            background: #12122A;
            border: 2px solid #8B5CF6;
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div style="max-width: 1200px; margin: 0 auto;">
        
        <div class="header">
            <div class="logo">VIVIDIA AI</div>
            <div class="profile">
                <div class="points"><i class="fas fa-star"></i> <span id="totalPoints">5</span></div>
                <div class="user-icon">👤</div>
            </div>
        </div>

        <!-- الخدمات -->
        <div class="services-grid">
            <div class="service-card" onclick="selectService('silicon')">
                <i class="fas fa-image"></i>
                <h3>صور (Silicon)</h3>
                <p id="siliconPoints">2</p>
            </div>
            <div class="service-card" onclick="selectService('zhipu')">
                <i class="fas fa-image"></i>
                <h3>صور (ZhiPu)</h3>
                <p id="zhipuPoints">3</p>
            </div>
            <div class="service-card" onclick="selectService('kling')">
                <i class="fas fa-video"></i>
                <h3>فيديو</h3>
                <p id="klingPoints">1</p>
            </div>
            <div class="service-card" onclick="showUpgrade()">
                <i class="fas fa-microphone"></i>
                <h3>صوت</h3>
                <p style="color: red;">❌ مجاني</p>
            </div>
        </div>

        <!-- منطقة الإدخال -->
        <div class="prompt-area">
            <textarea class="prompt-input" id="promptInput" rows="3">اكتب وصفك هنا...</textarea>
            <button class="generate-btn" onclick="generate()">توليد</button>
        </div>

        <!-- النتيجة -->
        <div class="output" id="output">
            <span>👋 اختر خدمة وابدأ</span>
        </div>

        <!-- خطط الأسعار -->
        <h2 style="text-align: center;">خطط الأسعار</h2>
        <div class="plans-grid">
            <div class="plan-card">
                <h3>مجاني</h3>
                <div class="plan-price">$0</div>
                <p>5 صور - 1 فيديو</p>
                <button onclick="selectPlan('free')">خطتك الحالية</button>
            </div>
            <div class="plan-card popular">
                <h3>احترافي</h3>
                <div class="plan-price">$7.99</div>
                <p>50 صورة - 10 فيديوهات - 30 دقيقة صوت</p>
                <button onclick="showPayment('pro')">اشترك الآن</button>
            </div>
            <div class="plan-card">
                <h3>مبدع</h3>
                <div class="plan-price">$24.99</div>
                <p>200 صورة - 50 فيديو - 3 ساعات صوت</p>
                <button onclick="showPayment('creative')">اشترك الآن</button>
            </div>
        </div>
    </div>

    <!-- نافذة الدفع -->
    <div class="payment-modal" id="paymentModal">
        <div class="payment-card">
            <h2 style="margin-bottom: 20px;">طريقة الدفع</h2>
            <div onclick="processPayment('crypto')" style="background: #1E1E3A; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer;">
                <i class="fab fa-bitcoin"></i> عملات رقمية
            </div>
            <div onclick="processPayment('card')" style="background: #1E1E3A; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer;">
                <i class="fas fa-credit-card"></i> بطاقة ائتمان
            </div>
            <div onclick="processPayment('alipay')" style="background: #1E1E3A; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer;">
                <i class="fab fa-alipay"></i> Alipay
            </div>
        </div>
    </div>

    <script>
        // ==================== المفاتيح الصينية ====================
        const KEYS = {
            siliconflow: 'sk-okdgfpnboitlnkyrznklbirazlrirfivfsdinqbzmwyytvwf',
            zhipu: 'd655d7cef24b4cffb2c208d23ff35bea.piRTgHXhBCWbyvqN',
            kling: { access: 'AD8rEeYePdM4GbaCDdayCYeKTg949Hgd', secret: 'NHFbp3MyBeL9AMLtDPAYtnnppfTYKLAt' }
        };

        // ==================== بيانات المستخدم ====================
        let userCredits = {
            silicon: 2,
            zhipu: 3,
            kling: 1,
            voice: 0
        };
        
        let currentService = 'silicon';

        // تحديث العرض
        function updateDisplay() {
            document.getElementById('siliconPoints').textContent = userCredits.silicon;
            document.getElementById('zhipuPoints').textContent = userCredits.zhipu;
            document.getElementById('klingPoints').textContent = userCredits.kling;
            document.getElementById('totalPoints').textContent = userCredits.silicon + userCredits.zhipu + userCredits.kling;
        }

        // اختيار خدمة
        function selectService(service) {
            currentService = service;
            document.getElementById('output').innerHTML = `✅ اخترت: ${service}`;
        }

        // توليد
        function generate() {
            if (userCredits[currentService] > 0) {
                userCredits[currentService]--;
                updateDisplay();
                document.getElementById('output').innerHTML = `✅ تم التوليد! المفتاح المستخدم: ${KEYS[currentService]}`;
            } else {
                showUpgrade();
            }
        }

        // ترقية
        function showUpgrade() {
            alert('هذه الخدمة للمشتركين فقط! اشترك الآن');
            document.getElementById('paymentModal').classList.add('show');
        }

        function showPayment(plan) {
            document.getElementById('paymentModal').classList.add('show');
        }

        function processPayment(method) {
            alert('✅ تمت عملية الدفع بنجاح');
            document.getElementById('paymentModal').classList.remove('show');
            
            // تجديد الرصيد للمشترك
            userCredits = { silicon: 50, zhipu: 50, kling: 10, voice: 30 };
            updateDisplay();
        }

        function selectPlan(plan) {
            if(plan === 'free') {
                userCredits = { silicon: 2, zhipu: 3, kling: 1, voice: 0 };
            }
            updateDisplay();
        }

        // بدء التشغيل
        window.onload = updateDisplay;
    </script>
</body>
</html>
