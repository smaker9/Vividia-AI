<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIDIA AI | Elite Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(15, 15, 15, 0.98);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .vividia-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .header { width: 100%; max-width: 1200px; padding: 30px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        
        .auth-group { display: flex; gap: 15px; }
        .btn { padding: 12px 26px; border-radius: 14px; cursor: pointer; border: none; font-weight: 700; transition: 0.3s; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(to right, var(--accent-purple), var(--accent-pink)); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border-color); }

        .creation-container {
            width: 95%; max-width: 800px; margin-top: 10px;
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 35px; padding: 35px; box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            box-sizing: border-box; position: relative;
        }

        /* 2. إصلاح القوائم المنسدلة */
        .settings-bar { display: flex; gap: 15px; margin-bottom: 25px; position: relative; }
        .setting-item { cursor: pointer; font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; padding: 10px 18px; background: rgba(255,255,255,0.03); border-radius: 12px; transition: 0.3s; border: 1px solid var(--border-color); }
        .setting-item:hover { background: rgba(255,255,255,0.08); color: white; border-color: var(--accent-purple); }

        .dropdown-content {
            position: absolute; top: 55px; width: 200px;
            background: #111; border: 1px solid var(--accent-purple);
            border-radius: 18px; padding: 10px; display: none; z-index: 5000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown-option { padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; color: var(--text-dim); }
        .dropdown-option:hover { background: var(--accent-purple); color: white; }

        /* Prompt Area */
        .prompt-wrapper { position: relative; background: #000; border: 1px solid var(--border-color); border-radius: 22px; padding: 20px; margin-bottom: 30px; }
        textarea { width: 92%; background: transparent; border: none; color: white; font-size: 1.15rem; outline: none; resize: none; min-height: 110px; }
        
        .magic-trigger {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 1.6rem; cursor: pointer; color: var(--accent-purple);
        }

        /* Services */
        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 35px; }
        .service-card {
            background: rgba(255,255,255,0.02); padding: 25px; border-radius: 24px; text-align: center;
            border: 1px solid var(--border-color); cursor: pointer; transition: 0.4s;
        }
        .service-card.active { background: var(--accent-purple); border-color: transparent; }
        .service-card i { font-size: 1.8rem; margin-bottom: 12px; display: block; }

        /* 3. Copyright Style */
        .footer-credits {
            margin-top: 40px; margin-bottom: 120px; text-align: center;
            color: var(--text-dim); font-size: 0.85rem; opacity: 0.6;
        }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-card { background: #111; border: 1px solid var(--border-color); padding: 40px; border-radius: 30px; width: 90%; max-width: 450px; text-align: center; }

        /* Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 650px;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 25px 0; border-top: 1px solid var(--border-color);
            z-index: 4000; border-radius: 30px 30px 0 0;
        }
        .nav-link { text-align: center; color: var(--text-dim); cursor: pointer; flex: 1; }
        .nav-link.active { color: var(--accent-purple); }
        .nav-link i { font-size: 1.5rem; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="vividia-logo">VIVIDIA AI</div>
        <div class="auth-group">
            <button class="btn btn-secondary" onclick="openModal('loginModal')">Sign In</button>
            <button class="btn btn-primary" onclick="openModal('loginModal')">Get Started</button>
        </div>
    </header>

    <main class="creation-container">
        <div class="settings-bar">
            <div class="setting-item" onclick="toggleDrop('modelDrop', event)"><i class="fas fa-brain"></i> <span id="txtModel">Model: Vividia 3.0</span></div>
            <div class="setting-item" onclick="toggleDrop('ratioDrop', event)"><i class="fas fa-expand"></i> <span id="txtRatio">Ratio: 16:9</span></div>
            
            <div id="modelDrop" class="dropdown-content" style="right: 0;">
                <div class="dropdown-option" onclick="applySet('txtModel', 'Vividia 3.0 Ultra')">Vividia 3.0 Ultra</div>
                <div class="dropdown-option" onclick="applySet('txtModel', 'Cinematic Pro')">Cinematic Pro</div>
                <div class="dropdown-option" onclick="applySet('txtModel', 'Fast Lightning')">Fast Lightning</div>
            </div>
            <div id="ratioDrop" class="dropdown-content" style="right: 160px;">
                <div class="dropdown-option" onclick="applySet('txtRatio', '1:1 Square')">1:1 Square</div>
                <div class="dropdown-option" onclick="applySet('txtRatio', '16:9 Widescreen')">16:9 Widescreen</div>
                <div class="dropdown-option" onclick="applySet('txtRatio', '9:16 Portrait')">9:16 Portrait</div>
            </div>
        </div>

        <div class="prompt-wrapper">
            <textarea id="promptIn" placeholder="Enter your creative prompt..."></textarea>
            <i class="fas fa-wand-magic-sparkles magic-trigger" onclick="runMagic()"></i>
        </div>

        <div class="services-grid">
            <div class="service-card active" onclick="selMode(this)"><i class="fas fa-image"></i><span>Image</span></div>
            <div class="service-card" onclick="selMode(this)"><i class="fas fa-video"></i><span>Video</span></div>
            <div class="service-card" onclick="selMode(this)"><i class="fas fa-music"></i><span>Music</span></div>
            <div class="service-card" onclick="selMode(this)"><i class="fas fa-microphone"></i><span>Voice</span></div>
            <div class="service-card" onclick="selMode(this)"><i class="fas fa-language"></i><span>Dubbing</span></div>
            <div class="service-card" onclick="selMode(this)"><i class="fas fa-wave-square"></i><span>SFX</span></div>
        </div>

        <button class="btn btn-primary" style="width:100%; padding:22px; font-size:1.2rem;" onclick="startGen()">GENERATE MAGIC</button>
    </main>

    <footer class="footer-credits">
        <p>© 2026 VIVIDIA AI - Professional Creative Suite</p>
    </footer>

    <nav class="bottom-nav">
        <div class="nav-link active"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-link" onclick="alert('Gallery empty')"><i class="fas fa-images"></i><span>Gallery</span></div>
        <div class="nav-link" onclick="openModal('howModal')"><i class="fas fa-info-circle"></i><span id="txtHow">How it works</span></div>
        <div class="nav-link" onclick="cycleLang()"><i class="fas fa-globe"></i><span id="langCode">EN</span></div>
    </nav>

    <div id="howModal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="howTitle" style="font-family: 'Orbitron'; margin-bottom: 20px;">How it works</h2>
            <div id="howSteps" style="text-align: right; color: var(--text-dim); line-height: 1.8;">
                </div>
            <button class="btn btn-primary" style="width:100%; margin-top:30px;" onclick="closeModal('howModal')">Got it!</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-card">
            <h2 style="font-family: 'Orbitron';">Get Started</h2>
            <button class="btn btn-secondary" style="width:100%; margin-bottom:12px;" onclick="closeModal('loginModal')">Continue with Google</button>
            <button class="btn btn-secondary" style="width:100%;" onclick="closeModal('loginModal')">Continue with Email</button>
        </div>
    </div>

    <script>
        // 1. ترجمة الإرشادات لجميع اللغات
        const translations = {
            'EN': {
                howTitle: "How Vividia Works",
                howSteps: "1. Describe your masterpiece.<br>2. Use Magic Enhance to improve prompt.<br>3. Select content type (Video/Image).<br>4. Click Generate Magic.",
                btnText: "How it works"
            },
            'AR': {
                howTitle: "كيف يعمل فيفيديا",
                howSteps: "1. اكتب وصفك الإبداعي.<br>2. استخدم السحر لتحسين النص.<br>3. اختر نوع المحتوى (فيديو/صورة).<br>4. اضغط على توليد السحر.",
                btnText: "كيف يعمل؟"
            },
            'FR': {
                howTitle: "Comment ça marche",
                howSteps: "1. Décrivez votre chef-d'œuvre.<br>2. Utilisez Magic Enhance pour améliorer.<br>3. Sélectionnez le type (Vidéo/Image).<br>4. Cliquez sur Générer la magie.",
                btnText: "Comment ça marche"
            },
            'ES': {
                howTitle: "Cómo funciona",
                howSteps: "1. Describe tu obra maestra.<br>2. Usa Magic Enhance para mejorar.<br>3. Selecciona el tipo (Video/Imagen).<br>4. Haz clic en Generar Magia.",
                btnText: "Cómo funciona"
            }
        };

        let currentLang = 'EN';

        function cycleLang() {
            const langs = ['EN', 'AR', 'FR', 'ES'];
            currentLang = langs[(langs.indexOf(currentLang) + 1) % langs.length];
            document.getElementById('langCode').innerText = currentLang;
            
            // تحديث واجهة الإرشادات
            const data = translations[currentLang];
            document.getElementById('txtHow').innerText = data.btnText;
            document.getElementById('howTitle').innerText = data.howTitle;
            document.getElementById('howSteps').innerHTML = data.howSteps;

            // تغيير اتجاه الموقع للعربي
            document.documentElement.dir = (currentLang === 'AR') ? 'rtl' : 'ltr';
            document.getElementById('howSteps').style.textAlign = (currentLang === 'AR') ? 'right' : 'left';
        }

        // 2. إصلاح القوائم المنسدلة
        function toggleDrop(id, e) {
            e.stopPropagation();
            const drop = document.getElementById(id);
            const isVisible = drop.style.display === 'block';
            document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
            drop.style.display = isVisible ? 'none' : 'block';
        }

        function applySet(id, val) {
            document.getElementById(id).innerText = val;
            document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
        }

        // إغلاق القوائم عند الضغط في أي مكان
        window.onclick = function() {
            document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
        };

        function openModal(id) { 
            if(id === 'howModal') {
                const data = translations[currentLang];
                document.getElementById('howTitle').innerText = data.howTitle;
                document.getElementById('howSteps').innerHTML = data.howSteps;
            }
            document.getElementById(id).style.display = 'flex'; 
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function selMode(el) {
            document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function startGen() {
            alert("Vividia Engine: Generating Magic...");
        }

        function runMagic() {
            const p = document.getElementById('promptIn');
            if(p.value) p.value = "Enhanced: " + p.value + " (Cinematic, 8k, Masterpiece)";
        }

        // تهيئة الإرشادات عند التشغيل
        cycleLang(); cycleLang(); // لضبط اللغة الافتراضية EN
    </script>
</body>
</html>
