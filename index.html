<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIDIA AI | Elite Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(15, 15, 15, 0.95);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
            --gold: #fbbf24;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 6. Logo Branding Customization */
        .vividia-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--accent-purple) 60%, var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.3));
        }

        /* Header */
        .header { width: 100%; max-width: 1200px; padding: 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        
        /* 4. Dynamic Auth Buttons */
        .auth-group { display: flex; gap: 15px; }
        .btn { padding: 12px 24px; border-radius: 14px; cursor: pointer; border: none; font-weight: 700; transition: 0.4s; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(to right, var(--accent-purple), var(--accent-pink)); color: white; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        .btn-primary:active { transform: scale(0.95); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border-color); }

        .creation-container {
            width: 95%; max-width: 750px; margin-top: 10px;
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 30px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            box-sizing: border-box; position: relative;
        }

        /* 1. Dropdown Activation */
        .settings-bar { display: flex; gap: 20px; margin-bottom: 25px; position: relative; }
        .setting-item { cursor: pointer; font-size: 0.9rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; padding: 8px 15px; background: rgba(255,255,255,0.03); border-radius: 10px; transition: 0.3s; }
        .setting-item:hover { color: white; background: rgba(255,255,255,0.08); }

        .dropdown-content {
            position: absolute; top: 50px; left: 0; width: 260px;
            background: #121212; border: 1px solid var(--border-color);
            border-radius: 18px; padding: 15px; display: none; z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .dropdown-option { display: flex; justify-content: space-between; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .dropdown-option:hover { background: var(--accent-purple); color: white; }

        /* 2. Magic Icon Activation */
        .prompt-wrapper { position: relative; background: #000; border: 1px solid var(--border-color); border-radius: 20px; padding: 18px; margin-bottom: 25px; transition: 0.3s; }
        .prompt-wrapper:focus-within { border-color: var(--accent-purple); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        textarea { width: 90%; background: transparent; border: none; color: white; font-size: 1.1rem; outline: none; resize: none; min-height: 100px; font-family: inherit; }
        
        .magic-trigger {
            position: absolute; bottom: 18px; left: 18px; /* التموضع حسب الصورة */
            font-size: 1.4rem; cursor: pointer;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: 0.5s; filter: drop-shadow(0 0 5px rgba(168,85,247,0.5));
        }
        .magic-trigger.spinning { transform: rotate(360deg); filter: hue-rotate(90deg); }

        /* 8. Professional Project Icons */
        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .service-card {
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; text-align: center;
            border: 1px solid var(--border-color); cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .service-card:hover { transform: translateY(-5px); border-color: var(--accent-purple); background: rgba(168, 85, 247, 0.05); }
        .service-card.active { background: var(--accent-purple); border-color: transparent; box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4); }
        .service-card i { font-size: 1.6rem; margin-bottom: 10px; display: block; transition: 0.3s; }

        /* 5. Realistic Payment Gateway */
        .pricing-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(168, 85, 247, 0.05));
            border: 1px solid var(--accent-purple); border-radius: 22px; padding: 20px;
            margin-top: 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .price-info h3 { margin: 0; font-size: 1.4rem; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .price-info p { margin: 5px 0 0; font-size: 0.8rem; color: var(--text-dim); }

        /* 3. Gallery Modal & 7. Persistent Preview */
        #previewBox { width: 100%; border-radius: 18px; overflow: hidden; margin-bottom: 20px; display: none; border: 2px solid var(--accent-purple); position: relative;}
        #previewBox img { width: 100%; height: 250px; object-fit: cover; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 600px;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid var(--border-color);
            z-index: 3000; border-radius: 25px 25px 0 0;
        }
        .nav-link { text-align: center; color: var(--text-dim); cursor: pointer; transition: 0.3s; position: relative; }
        .nav-link.active { color: var(--accent-purple); }
        .nav-link i { font-size: 1.4rem; display: block; margin-bottom: 5px; }
        .nav-link span { font-size: 0.75rem; font-weight: 600; }

        /* Gallery Overlay */
        #galleryOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000; display: none; padding: 50px 20px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 500px; margin: 0 auto; }
        .gallery-item { border-radius: 15px; overflow: hidden; height: 150px; border: 1px solid var(--border-color); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Progress & Status */
        #progressArea { display: none; margin-top: 20px; }
        .bar-bg { width: 100%; height: 6px; background: #111; border-radius: 10px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink)); transition: 0.4s; }
    </style>
</head>
<body>

    <audio id="magicSfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="successSfx" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <header class="header">
        <div class="vividia-logo">VIVIDIA AI</div>
        <div class="auth-group">
            <button class="btn btn-secondary" onclick="authSim('Login')">Sign In</button>
            <button class="btn btn-primary" onclick="authSim('Register')">Get Started</button>
        </div>
    </header>

    <main class="creation-container">
        <div class="settings-bar">
            <div class="setting-item" onclick="toggleDrop('modelDrop')"><i class="fas fa-cube"></i> <span id="curModel">Model: Vividia 3.0</span></div>
            <div class="setting-item" onclick="toggleDrop('ratioDrop')"><i class="fas fa-expand"></i> <span id="curRatio">Ratio: 16:9</span></div>
            
            <div id="modelDrop" class="dropdown-content">
                <div class="dropdown-option" onclick="setVal('curModel', 'Vividia 3.0')">Vividia 3.0 <span>Stable</span></div>
                <div class="dropdown-option" onclick="setVal('curModel', 'Veo Turbo')">Veo Turbo <span>Fast</span></div>
                <div class="dropdown-option" onclick="setVal('curModel', 'Nano Pro')">Nano Pro <span>Art</span></div>
            </div>

            <div id="ratioDrop" class="dropdown-content">
                <div class="dropdown-option" onclick="setVal('curRatio', '16:9')">16:9 <span>Cinema</span></div>
                <div class="dropdown-option" onclick="setVal('curRatio', '1:1')">1:1 <span>Square</span></div>
                <div class="dropdown-option" onclick="setVal('curRatio', '9:16')">9:16 <span>TikTok</span></div>
            </div>
        </div>

        <div id="previewBox">
            <button class="remove-btn" onclick="clearPreview()">&times;</button>
            <img id="mainPreview" src="" alt="Preview">
        </div>

        <div class="prompt-wrapper">
            <textarea id="mainPrompt" placeholder="Describe your masterpiece..."></textarea>
            <i class="fas fa-wand-magic-sparkles magic-trigger" id="magicIcon" onclick="activateMagic()" title="Smart Enhance"></i>
        </div>

        <div class="services-grid">
            <div class="service-card active" onclick="switchMode(this, 'Image')"><i class="fas fa-image"></i><span>Image</span></div>
            <div class="service-card" onclick="switchMode(this, 'Video')"><i class="fas fa-play"></i><span>Video</span></div>
            <div class="service-card" onclick="switchMode(this, 'Music')"><i class="fas fa-music"></i><span>Music</span></div>
            <div class="service-card" onclick="switchMode(this, 'Voice')"><i class="fas fa-microphone"></i><span>Voice</span></div>
            <div class="service-card" onclick="switchMode(this, 'Dubbing')"><i class="fas fa-language"></i><span>Dubbing</span></div>
            <div class="service-card" onclick="switchMode(this, 'SFX')"><i class="fas fa-wave-square"></i><span>SFX</span></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn btn-secondary" onclick="document.getElementById('fileIn').click()"><i class="fas fa-upload"></i> Upload</button>
            <input type="file" id="fileIn" hidden onchange="processFile(this)">
            <button class="btn btn-secondary" style="background: var(--accent-purple);" onclick="alert('Exporting MP4...')"><i class="fas fa-download"></i> Download MP4</button>
        </div>

        <div id="progressArea">
            <p id="statusTxt" style="font-size: 0.8rem; color: var(--accent-purple); text-align: center;">Initializing...</p>
            <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
        </div>

        <button class="btn btn-primary" id="genBtn" style="width:100%; margin-top:25px; padding:20px; font-size:1.1rem;" onclick="runGeneration()">GENERATE MAGIC</button>

        <div class="pricing-card">
            <div class="price-info">
                <h3>Elite Membership 7.60$</h3>
                <p>100 Images | 10 Videos | 20k Voice Tokens</p>
            </div>
            <button class="btn btn-primary" style="padding: 10px 20px;" onclick="paymentFlow()">Subscribe</button>
        </div>
    </main>

    <div id="galleryOverlay">
        <h2 style="text-align: center; font-family: 'Orbitron';">Your Masterpieces</h2>
        <div class="gallery-grid" id="galleryContainer">
            </div>
        <button class="btn btn-secondary" style="display:block; margin: 30px auto;" onclick="toggleGallery(false)">Close Gallery</button>
    </div>

    <div style="height: 120px;"></div>

    <nav class="bottom-nav">
        <div class="nav-link active" onclick="navTo('home')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-link" onclick="toggleGallery(true)"><i class="fas fa-images"></i><span>Gallery</span></div>
        <div class="nav-link" onclick="navTo('how')"><i class="fas fa-info-circle"></i><span>How it works</span></div>
        <div class="nav-link" onclick="changeLang()"><i class="fas fa-globe"></i><span id="langLabel">EN</span></div>
    </nav>

    <script>
        // 7. Persistent Upload Logic (Save to LocalStorage)
        window.onload = () => {
            const savedImg = localStorage.getItem('vividia_last_upload');
            if(savedImg) {
                showPreview(savedImg);
            }
        };

        function processFile(input) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64 = e.target.result;
                    localStorage.setItem('vividia_last_upload', base64);
                    showPreview(base64);
                    addToGallery(base64);
                };
                reader.readAsDataURL(file);
            }
        }

        function showPreview(src) {
            const box = document.getElementById('previewBox');
            const img = document.getElementById('mainPreview');
            img.src = src;
            box.style.display = 'block';
        }

        function clearPreview() {
            localStorage.removeItem('vividia_last_upload');
            document.getElementById('previewBox').style.display = 'none';
        }

        // 1. Dropdown Logic
        function toggleDrop(id) {
            document.querySelectorAll('.dropdown-content').forEach(d => {
                if(d.id !== id) d.style.display = 'none';
            });
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function setVal(id, val) {
            document.getElementById(id).innerText = (id.includes('Model') ? 'Model: ' : 'Ratio: ') + val;
            document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
        }

        // 2. Magic Icon Logic
        function activateMagic() {
            const icon = document.getElementById('magicIcon');
            const prompt = document.getElementById('mainPrompt');
            const sfx = document.getElementById('magicSfx');
            
            if(!prompt.value) { alert("Write something first!"); return; }
            
            sfx.play();
            icon.classList.add('spinning');
            
            setTimeout(() => {
                prompt.value = "Enhanced Masterpiece: " + prompt.value + " (hyper-realistic, 8k, cinematic lighting, masterpiece)";
                icon.classList.remove('spinning');
            }, 1000);
        }

        // 3. Gallery Logic
        function toggleGallery(show) {
            document.getElementById('galleryOverlay').style.display = show ? 'block' : 'none';
        }

        function addToGallery(src) {
            const container = document.getElementById('galleryContainer');
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `<img src="${src}">`;
            container.prepend(div);
        }

        // 4. Dynamic Auth
        function authSim(type) {
            const name = prompt(`Enter your name to ${type}:`);
            if(name) {
                document.querySelector('.auth-group').innerHTML = `<span style="font-weight:bold; color:var(--accent-purple)">Welcome, ${name}</span>`;
            }
        }

        // 5. Payment Flow
        function paymentFlow() {
            const btn = event.target;
            btn.innerText = "Processing...";
            setTimeout(() => {
                alert("Redirecting to Secure Payment Gateway (Stripe/PayPal)...");
                btn.innerText = "Subscribe";
            }, 1000);
        }

        // 8. Professional Switch Mode
        function switchMode(el, mode) {
            document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            console.log("Switched to " + mode + " mode. Media preserved.");
        }

        // Generation Process
        function runGeneration() {
            const area = document.getElementById('progressArea');
            const fill = document.getElementById('barFill');
            const txt = document.getElementById('statusTxt');
            const btn = document.getElementById('genBtn');

            area.style.display = 'block';
            btn.disabled = true;
            btn.style.opacity = '0.5';

            let p = 0;
            const steps = ["Analyzing Prompt...", "Fetching AI Model...", "Rendering Pixels...", "Finalizing..."];
            
            const timer = setInterval(() => {
                p += Math.random() * 15;
                if(p >= 100) {
                    p = 100;
                    clearInterval(timer);
                    document.getElementById('successSfx').play();
                    txt.innerText = "Success!";
                    setTimeout(() => {
                        area.style.display = 'none';
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        fill.style.width = '0%';
                        alert("Magic Generated! Check your Gallery.");
                    }, 1000);
                }
                fill.style.width = p + "%";
                txt.innerText = steps[Math.floor(p/30)] || "Finishing...";
            }, 500);
        }

        function changeLang() {
            const label = document.getElementById('langLabel');
            label.innerText = label.innerText === 'EN' ? 'AR' : 'EN';
            document.documentElement.dir = label.innerText === 'AR' ? 'rtl' : 'ltr';
        }
    </script>
</body>
</html>
