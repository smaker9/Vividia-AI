<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vividia AI - Edit Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --side: #0f0f11; --accent: #a855f7; --card: #161618; --text: #ffffff; --border: #26262b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Styling */
        .sidebar { width: 280px; background: var(--side); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; z-index: 2000; overflow-y: auto; }
        .logo { font-size: 24px; font-weight: 900; color: var(--accent); margin-bottom: 40px; display: flex; align-items: center; gap: 12px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #888; transition: 0.2s; margin-bottom: 6px; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: #1c1c1f; color: var(--accent); }
        .nav-item i { width: 20px; text-align: center; }

        /* Main Content Styling */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }

        /* Studio Styling - بناءً على الصورة */
        .studio-container { padding: 30px; display: flex; gap: 25px; flex-wrap: wrap; }
        
        .upload-area { flex: 1; min-width: 300px; background: var(--card); border: 2px dashed #333; border-radius: 25px; min-height: 480px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: var(--accent); }
        .upload-area i { font-size: 50px; margin-bottom: 15px; }

        .edit-tools-panel { width: 340px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .tool-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        
        /* زر إزالة الخلفية كما في الصورة */
        .btn-remove-bg { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; font-size: 14px;}
        
        .slider-group { margin-bottom: 20px; }
        .slider-group label { display: flex; justify-content: space-between; font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .slider-group input { width: 100%; accent-color: var(--accent); cursor: pointer; }

        @media (max-width: 900px) {
            .sidebar { position: fixed; right: -280px; height: 100%; }
            .sidebar.open { right: 0; }
            .edit-tools-panel { width: 100%; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo"><i class="fas fa-brain"></i> VIVIDIA AI</div>
        
        <div class="nav-item active" onclick="alert('شات فيفيديا')"><i class="fas fa-comment-dots"></i> <span>شات فيفيديا</span></div>
        <div class="nav-item" onclick="alert('استوديو التعديل')"><i class="fas fa-wand-magic-sparkles"></i> <span>استوديو التعديل</span></div>
        <div class="nav-item" onclick="alert('توليد الصور')"><i class="fas fa-palette"></i> <span>توليد الصور (Nano)</span></div>
        <div class="nav-item" onclick="alert('فيديو')"><i class="fas fa-video"></i> <span>فيديو (Veo)</span></div>
    </aside>

    <div class="main">
        <header>
            <div onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars-staggered" style="font-size:22px; cursor:pointer;"></i></div>
            <div style="color:var(--accent); font-weight:bold;">Edit Studio</div>
        </header>

        <div class="studio-container">
            <div class="upload-area" onclick="document.getElementById('imgInp').click()">
                <input type="file" id="imgInp" hidden>
                <i class="fas fa-cloud-arrow-up"></i>
                <p>Upload Image</p>
            </div>
            
            <div class="edit-tools-panel">
                <h3 class="tool-title">Edit Tools</h3>
                
                <button class="btn-remove-bg">
                    <i class="fas fa-eraser"></i> Remove Background (AI)
                </button>
                
                <div class="slider-group">
                    <label><span>Brightness</span> <span>0</span></label>
                    <input type="range" min="0" max="200" value="100">
                </div>
                
                <div class="slider-group">
                    <label><span>Contrast</span> <span>91</span></label>
                    <input type="range" min="0" max="200" value="91">
                </div>
            </div>
        </div>
    </div>

    <script>
        // دالة لتبديل القائمة في الموبايل
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
