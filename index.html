<script>
async function processPayment(method) {
    const planPrice = selectedPlan === 'pro' ? 7.99 : 19.99;
    
    // إظهار رسالة انتظار
    document.getElementById('output').innerHTML = '⏳ جاري تحضير رابط الدفع...';
    
    try {
        // استدعاء خادمك (غير الرابط حسب مكان استضافته)
        const response = await fetch('https://your-backend.com/api/create-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                plan: selectedPlan,
                amount: planPrice,
                method: method
            })
        });
        
        const data = await response.json();
        
        if (data.success && data.paymentUrl) {
            // توجيه المستخدم إلى صفحة الدفع الآمنة لـ Cryptomus
            window.location.href = data.paymentUrl;
        } else {
            document.getElementById('output').innerHTML = `❌ فشل إنشاء الدفع: ${data.error || 'خطأ غير معروف'}`;
        }
    } catch (error) {
        document.getElementById('output').innerHTML = `❌ خطأ في الاتصال بالخادم: ${error.message}`;
    }
}
</script>
