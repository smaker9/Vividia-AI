<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVIDIA AI | Professional Creation Suite</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --panel-bg: rgba(15, 15, 15, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent-purple: #8b5cf6;
            --accent-pink: #d946ef;
            --glass: blur(30px);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- خلفية متحركة احترافية --- */
        .background-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(217, 70, 239, 0.1) 0%, transparent 40%);
        }

        /* --- الهيدر وأزرار التسجيل (في الأعلى) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            position: absolute;
            top: 0;
            z-index: 1000;
        }

        .auth-buttons { display: flex; gap: 10px; }
        .btn-auth {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn-auth.primary { background: var(--accent-purple); border: none; }
        .btn-auth:hover { background: rgba(255,255,255,0.1); }

        /* --- لوحة التحكم الرئيسية --- */
        .main-panel {
            background: var(--panel-bg);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border-color);
            border-radius: 35px;
            width: 95%;
            max-width: 550px;
            margin-top: 100px;
            padding: 30px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            margin-bottom: 120px;
        }

        /* --- مربع Prompt احترافي (نمط ليوناردو) --- */
        .prompt-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .prompt-container:focus-within { border-color: var(--accent-purple); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
        .prompt-container textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            min-height: 100px;
            line-height: 1.5;
        }

        /* --- أيقونات الخدمات الكبيرة --- */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .service-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .service-card i { font-size: 2rem; margin-bottom: 12px; display: block; color: var(--text-dim); }
        .service-card span { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }
        
        .service-card.active {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border: none;
            transform: scale(1.08);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.4);
        }
        .service-card.active i, .service-card.active span { color: white; }

        .create-btn {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white; border: none; width: 100%; padding: 20px;
            border-radius: 18px; font-weight: 800; font-size: 1.2rem;
            cursor: pointer; margin-bottom: 25px; transition: 0.3s;
            letter-spacing: 1px;
        }

        /* --- البار السفلي الذكي --- */
        .bottom-nav {
            position: fixed;
            bottom: 25px;
            width: 90%;
            max-width: 500px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            z-index: 1000;
        }
        .nav-item { text-align: center; color: var(--text-dim); cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 5px; }
        .nav-item p { margin: 0; font-size: 0.75rem; font-weight: 500; }
        .nav-item.active { color: var(--accent-pink); }

        /* --- نافذة تسجيل الدخول --- */
        #authModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; border: 1px solid var(--accent-purple);
            padding: 45px; border-radius: 30px; text-align: center; width: 350px;
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.3);
        }
        .social-btn {
            width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px;
            border: 1px solid #333; background: #000; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 600;
        }

        /* --- تعليمات العمل الجانبية --- */
        .instructions-panel {
            position: fixed; top: 0; right: -400px; width: 350px; height: 100%;
            background: rgba(10, 10, 10, 0.98); border-left: 1px solid var(--accent-purple);
            padding: 30px; transition: 0.5s; z-index: 1500; overflow-y: auto;
        }
        .instructions-panel.open { right: 0; }
    </style>
</head>
<body>

    <div class="background-animation"></div>

    <header class="header">
        <div class="logo">VIVIDIA <span style="color:var(--accent-purple)">AI</span></div>
        <div class="auth-buttons">
            <button class="btn-auth" onclick="openAuth('login')">Sign In</button>
            <button class="btn-auth primary" onclick="openAuth('register')">Get Started</button>
        </div>
    </header>

    <div class="instructions-panel" id="instructionsPanel">
        <i class="fas fa-times" onclick="toggleInstructions()" style="cursor:pointer; font-size:1.5rem;"></i>
        <h2 id="instrTitle" style="color:var(--accent-purple); margin-top:20px;"></h2>
        <div id="instrBody" style="line-height:1.8; color:var(--text-dim);"></div>
    </div>

    <div id="authModal">
        <div class="modal-content">
            <h2 id="modalTitle">Welcome</h2>
            <button class="social-btn"><i class="fab fa-google" style="color:#DB4437"></i> Continue with Google</button>
            <button class="social-btn"><i class="fas fa-envelope"></i> Continue with Email</button>
            <p style="margin-top:25px; cursor:pointer; color:var(--accent-purple)" onclick="closeAuth()">Close Window</p>
        </div>
    </div>

    <div class="main-panel">
        <div id="section-home" class="panel-section active">
            
            <div class="prompt-container">
                <textarea id="mainPrompt" placeholder="Describe your masterpiece..."></textarea>
                <div style="display:flex; justify-content: space-between; color:var(--text-dim); font-size:0.75rem;">
                    <span>AI Intelligent Engine</span>
                    <i class="fas fa-wand-magic-sparkles"></i>
                </div>
            </div>

            <div class="services-grid">
                <div class="service-card active" onclick="selectService('image', this)">
                    <i class="fas fa-image"></i><span>Image</span>
                </div>
                <div class="service-card" onclick="selectService('video', this)">
                    <i class="fas fa-play"></i><span>Video</span>
                </div>
                <div class="service-card" onclick="selectService('music', this)">
                    <i class="fas fa-music"></i><span>Music</span>
                </div>
                <div class="service-card" onclick="selectService('voice', this)">
                    <i class="fas fa-microphone"></i><span>Voice</span>
                </div>
            </div>

            <button class="create-btn" onclick="processCreation()">GENERATE MAGIC</button>

            <div class="sub-panel" style="text-align:center; background:rgba(255,255,255,0.03); padding:20px; border-radius:20px; border:1px solid var(--accent-purple);">
                <div id="planTitle" style="font-weight:600;">Elite Membership</div>
                <div id="dynamicPrice" style="font-size:2.5rem; font-weight:900; margin:10px 0;">7.60<span>$</span></div>
                <div id="planLimits" style="font-size:0.8rem; color:var(--text-dim);">Full Access to All AI Models</div>
            </div>
        </div>

        <div id="section-gallery" class="panel-section" style="display:none; text-align:center; padding:40px 0;">
            <i class="fas fa-images" style="font-size:3rem; color:var(--accent-purple); margin-bottom:15px;"></i>
            <h3>Your Gallery</h3>
            <p>Please <span style="color:var(--accent-pink); cursor:pointer;" onclick="openAuth()">Sign In</span> to view your saved projects.</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="changeSection('home', this)"><i class="fas fa-house"></i><p>Home</p></div>
        <div class="nav-item" onclick="changeSection('gallery', this)"><i class="fas fa-folder-open"></i><p>Gallery</p></div>
        <div class="nav-item" onclick="toggleInstructions()"><i class="fas fa-circle-info"></i><p>How it works</p></div>
        <div class="nav-item" id="langSwitch" onclick="switchLang()"><i class="fas fa-globe"></i><p>EN</p></div>
    </nav>

    <script>
        // نظام اللغات والعملات الديناميكي
        const config = {
            en: {
                prompt: "Describe your masterpiece...",
                price: "7.60", symbol: "$",
                instrTitle: "How it works?",
                instrBody: "1. Choose a service.<br>2. Write your prompt.<br>3. Hit Generate.<br>4. Sign in to save your history.",
                home: "Home", gallery: "Gallery", how: "Help"
            },
            ar: {
                prompt: "صف عملك الفني بالتفصيل...",
                price: "28.50", symbol: "SAR",
                instrTitle: "كيف يعمل الموقع؟",
                instrBody: "١. اختر الخدمة المطلوبة.<br>٢. اكتب الوصف الخاص بك.<br>٣. اضغط على توليد.<br>٤. سجل دخولك لحفظ مشروعاتك.",
                home: "الرئيسية", gallery: "المعرض", how: "مساعدة"
            }
        };

        let currentLang = 'en';

        function switchLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            const c = config[currentLang];
            
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('mainPrompt').placeholder = c.prompt;
            document.getElementById('dynamicPrice').innerHTML = `${c.price}<span style="font-size:1.2rem;">${c.symbol}</span>`;
            document.getElementById('langSwitch').querySelector('p').innerText = currentLang.toUpperCase();
            
            document.getElementById('instrTitle').innerText = c.instrTitle;
            document.getElementById('instrBody').innerHTML = c.instrBody;
        }

        function toggleInstructions() {
            document.getElementById('instructionsPanel').classList.toggle('open');
            if(document.getElementById('instructionsPanel').classList.contains('open')) {
                const c = config[currentLang];
                document.getElementById('instrTitle').innerText = c.instrTitle;
                document.getElementById('instrBody').innerHTML = c.instrBody;
            }
        }

        function selectService(type, el) {
            document.querySelectorAll('.service-card').forEach(card => card.classList.remove('active'));
            el.classList.add('active');
        }

        function changeSection(id, el) {
            document.querySelectorAll('.panel-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('section-' + id).style.display = 'block';
            el.classList.add('active');
        }

        function openAuth(mode) {
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = mode === 'login' ? 'Welcome Back' : 'Create Account';
        }

        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }

        function processCreation() {
            alert(currentLang === 'ar' ? "برجاء تسجيل الدخول لحفظ تقدمك" : "Please Sign In to save your progress");
            openAuth('register');
        }

        // تحديد اللغة تلقائياً بناءً على المتصفح
        window.onload = () => {
            if(navigator.language.startsWith('ar')) switchLang();
        }
    </script>
</body>
</html>
